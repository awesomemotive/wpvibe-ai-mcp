name: PHP Lint

on:
  pull_request:
    paths:
      - '**.php'
  push:
    branches: [main]
    paths:
      - '**.php'

jobs:
  lint:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.2']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Show PHP version
        run: php --version

      - name: Syntax-check all PHP files
        run: |
          find . -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -print0 \
            | xargs -0 -n1 -P 4 php -l
